<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 最終探索</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .log-entry { margin: 10px 0; padding: 10px; border-radius: 5px; text-align: left; font-size: 0.8rem; font-family: monospace; border: 1px solid #ddd; word-break: break-all; }
        button { padding: 15px; width: 100%; background: #00704a; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .success { background: #f6ffed; border-color: #b7eb8f; color: #389e0d; font-weight: bold; }
        .fail { background: #fff1f0; border-color: #ffa39e; color: #cf1322; }
    </style>
</head>
<body>

<div class="card">
    <h3>Gemini 接続・最終探索</h3>
    <input type="text" id="keyInput" placeholder="API Keyを貼り付け">
    <button id="runBtn">自動探索スタート</button>
    <div id="log"></div>
</div>

<script>
    const logDiv = document.getElementById('log');
    function addLog(msg, type) {
        const div = document.createElement('div');
        div.className = 'log-entry ' + type;
        div.innerText = msg;
        logDiv.prepend(div);
    }

    document.getElementById('runBtn').onclick = async () => {
        const key = document.getElementById('keyInput').value.trim();
        if(!key) return alert("Keyを入れてください");
        logDiv.innerHTML = "";
        
        // 2024年中盤以降の推奨モデル名とエンドポイントの全組み合わせ
        const targets = [
            { id: "gemini-1.5-flash-latest", ver: "v1beta" },
            { id: "gemini-1.5-flash", ver: "v1beta" },
            { id: "gemini-1.5-pro-latest", ver: "v1beta" },
            { id: "gemini-1.5-pro", ver: "v1beta" },
            { id: "gemini-pro", ver: "v1" }
        ];

        for (const t of targets) {
            const url = `https://generativelanguage.googleapis.com/${t.ver}/models/${t.id}:generateContent?key=${key}`;
            addLog(`試行中: ${t.ver} / ${t.id}...`, '');
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Hi" }] }] })
                });
                const data = await res.json();
                
                if (res.ok && data.candidates) {
                    addLog(`🎯 成功!!\nURL: ${url.split('?')[0]}`, 'success');
                    return;
                } else {
                    const errMsg = data.error ? data.error.message : "Not Found";
                    addLog(`❌ 失敗: ${t.id} (${errMsg})`, 'fail');
                }
            } catch (e) {
                addLog(`🚫 エラー: ${t.id} (${e.message})`, 'fail');
            }
        }
        addLog("全パターン失敗。APIキーが「有効」かつ「制限なし」であることをAI Studioで確認してください。", 'fail');
    };
</script>
</body>
</html>
