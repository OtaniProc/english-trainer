<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100 Phrases Master - V5</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f0f4f8; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; position: relative; overflow: hidden; }
        
        .streak-container { margin-bottom: 10px; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .flame-normal { color: #e53e3e; }
        .flame-active { color: #3182ce; animation: flame-burn 0.5s infinite alternate; text-shadow: 0 0 10px #63b3ed; }
        @keyframes flame-burn { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }
        .trophy { color: #ecc94b; filter: drop-shadow(0 0 5px gold); }

        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: #00704a; width: 0%; transition: 0.3s; }
        
        #jp-phrase { font-size: 1.4rem; font-weight: bold; min-height: 4rem; margin: 15px 0; color: #333; line-height: 1.4; }
        #interim-transcript { font-size: 1.1rem; color: #d9534f; min-height: 2em; font-style: italic; margin-bottom: 15px; border-bottom: 2px solid #eee; word-break: break-all; padding: 5px; }
        
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .status-ready { background: #e1f5fe; color: #01579b; }
        .status-rec { background: #ffebee; color: #c62828; }
        .status-review { background: #fefcbf; color: #744210; }
        
        .button-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-size: 1rem; font-weight: bold; flex: 1 1 45%; transition: 0.2s; }
        
        #rec-btn { background-color: #00704a; color: white; flex: 1 1 90%; touch-action: none; user-select: none; -webkit-touch-callout: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #rec-btn:active { transform: scale(0.96); box-shadow: 0 2px 3px rgba(0,0,0,0.2); }
        #hint-btn { background-color: #f0ad4e; color: white; }
        #pass-btn { background-color: #eee; color: #555; }
        
        /* 新規追加ボタンのスタイル */
        #retry-btn { background-color: #ed8936; color: white; display: none; }
        #override-btn { background-color: #48bb78; color: white; display: none; }
        #next-btn { background-color: #01579b; color: white; flex: 1 1 90%; display: none; }

        .result-panel { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: left; }
        .correct { background-color: #e8f5e9; border: 2px solid #4caf50; }
        .incorrect { background-color: #fff5f5; border: 2px solid #feb2b2; }
        .model-text { font-size: 1.1rem; font-weight: bold; color: #2e7d32; cursor: pointer; display: inline-block; padding: 5px; border-radius: 5px; background: rgba(76, 175, 80, 0.1); }
        .model-text:active { background: rgba(76, 175, 80, 0.3); }
        
        #round-end-panel { display: none; margin-top: 20px; text-align: center; }
        #start-review-btn { background-color: #e53e3e; color: white; width: 100%; margin-bottom: 10px; }
        #next-round-btn { background-color: #01579b; color: white; width: 100%; }

        #celebration { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .congrats-text { font-size: 1.8rem; font-weight: bold; color: #00704a; margin-bottom: 10px; }
        
        #settings-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888; }
        #setup-panel { display: none; margin-top: 15px; text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <button id="settings-btn">⚙️</button>
    
    <div id="celebration">
        <div style="font-size: 4rem;">🏆</div>
        <div class="congrats-text">全フレーズ制覇！</div>
        <p>素晴らしい努力ですね。この調子で「次の100フレーズ」にも挑戦してみましょう！</p>
        <button onclick="closeCelebration()" style="background: #00704a; color: white; width: 80%; padding: 15px; border: none; border-radius: 30px; font-weight: bold;">閉じる</button>
    </div>

    <div class="streak-container" id="streak-display"></div>

    <div id="status" class="status-badge status-ready">READY</div>
    <div id="progress-text" style="font-size: 0.8rem; color: #888;">Phrase 1 / 10</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="total-mastery-text" style="font-size: 0.7rem; color: #aaa; margin-top: -5px;">全フレーズ達成度: 0%</div>
    
    <div id="learning-ui">
        <div id="jp-phrase">Loading...</div>
        <div id="interim-transcript"></div>
        
        <div class="button-group">
            <button id="rec-btn" oncontextmenu="return false;">👆 押している間ずっと録音</button>
            <button id="hint-btn">💡 ヒント</button>
            <button id="pass-btn">パス</button>
            
            <button id="retry-btn">🔄 やり直す</button>
            <button id="override-btn">✅ 正解にする</button>
            
            <button id="next-btn">次のフレーズへ ➔</button>
        </div>

        <div id="result-panel" class="result-panel">
            <div id="result-msg" style="font-weight: bold; margin-bottom: 10px;"></div>
            <div class="model-text" id="model-text" onclick="playTTS()">🔊 Model: <span id="model-text-content"></span></div>
            <div class="user-text" id="user-text"></div>
        </div>
    </div>

    <div id="round-end-panel">
        <div style="font-size: 3rem; margin-bottom: 10px;">🏁</div>
        <h3 id="round-end-title" style="color: #00704a; margin-bottom: 5px;">10問完了！</h3>
        <p id="round-end-msg" style="color: #555; margin-bottom: 20px; font-weight: bold;"></p>
        <button id="start-review-btn">⚠️ 間違えた問題を復習</button>
        <button id="next-round-btn">🔄 新しいランダム10問へ</button>
    </div>

    <div id="setup-panel">
        <textarea id="import-data" placeholder="日本語 [TAB] 英語 の形式で貼り付けてください"></textarea>
        <button onclick="importNewData()" style="background:#01579b; color:white; width:100%; margin-bottom:5px; padding:10px; border:none; border-radius:10px; font-weight:bold;">新データを登録して進捗をリセット</button>
        <button onclick="loadWeak()" style="background:#e53e3e; color:white; width:100%; padding:10px; border:none; border-radius:10px; font-weight:bold;">苦手フレーズを特訓</button>
        <button onclick="clearAllData()" style="background:#777; color:white; width:100%; padding:10px; border:none; border-radius:10px; margin-top:15px;">🗑 全データを初期化 (エラー時)</button>
    </div>
</div>

<script>
    window.onerror = function(msg, url, lineNo) {
        const p = document.getElementById('jp-phrase');
        if(p) p.innerText = "エラーが発生しました: " + msg;
        return false;
    };

    const DEFAULT_DATA = [{jp: "継続は力なり、ですね。", eng: "Consistency is key, isn't it?"}];
    let currentList = [], currentIndex = 0, reviewList = [], isReviewMode = false;
    let isHolding = false, globalText = "", currentSessionText = "";

    function safeGetArray(key, fallback) {
        try {
            const data = JSON.parse(localStorage.getItem(key));
            return Array.isArray(data) ? data : fallback;
        } catch(e) { return fallback; }
    }
    
    function safeGetObject(key, fallback) {
        try {
            const data = JSON.parse(localStorage.getItem(key));
            return (data !== null && typeof data === 'object' && !Array.isArray(data)) ? data : fallback;
        } catch(e) { return fallback; }
    }

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRec) {
        recognition = new SpeechRec();
        recognition.lang = 'en-US'; recognition.interimResults = true; recognition.continuous = false; 
    } else {
        alert("お使いのブラウザは音声認識に対応していません。");
    }

    const btnRec = document.getElementById('rec-btn'), interimDisplay = document.getElementById('interim-transcript'),
          resultPanel = document.getElementById('result-panel'), setupPanel = document.getElementById('setup-panel'),
          learningUI = document.getElementById('learning-ui'), roundEndPanel = document.getElementById('round-end-panel');

    function updateStreakUI() {
        try {
            const today = new Date().toDateString();
            let streakData = safeGetObject('takashi_streak', {count: 0, last: ""});
            
            if (typeof streakData.count !== 'number') streakData.count = 0;
            if (typeof streakData.last !== 'string') streakData.last = "";
            
            if (streakData.last !== today) {
                const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                if (streakData.last === yesterday.toDateString()) streakData.count++;
                else if (streakData.last !== "") streakData.count = 1;
                else streakData.count = 1;
                streakData.last = today;
                localStorage.setItem('takashi_streak', JSON.stringify(streakData));
            }

            const container = document.getElementById('streak-display');
            if (container) {
                container.innerHTML = streakData.count >= 30 ? '<span class="trophy">🏆</span>' : '';
                const flameClass = streakData.count >= 7 ? 'flame-active' : 'flame-normal';
                container.innerHTML += `<span class="${flameClass}">🔥</span><span>${streakData.count} days streak</span>`;
            }
        } catch(err) { console.error("Streak UI Error:", err); }
    }

    function checkTotalMastery() {
        try {
            const masterData = safeGetArray('takashi_master_data', DEFAULT_DATA);
            const masteredKeys = safeGetArray('takashi_mastered_keys', []);
            const total = masterData.length;
            const count = masterData.filter(d => d && d.eng && masteredKeys.includes(d.eng)).length;
            
            const masteryText = document.getElementById('total-mastery-text');
            if (masteryText) {
                masteryText.innerText = `全フレーズ達成度: ${total > 0 ? Math.floor((count / total) * 100) : 0}% (${count}/${total})`;
            }
            
            const celebration = document.getElementById('celebration');
            if (count >= total && total > 0 && celebration) celebration.style.display = 'flex';
        } catch(err) { console.error("Mastery Check Error:", err); }
    }

    function closeCelebration() { document.getElementById('celebration').style.display = 'none'; }

    function importNewData() {
        const text = document.getElementById('import-data').value;
        const lines = text.trim().split('\n');
        const newData = lines.map(l => { const p = l.split('\t'); return p.length >= 2 ? {jp:p[0].trim(), eng:p[1].trim()} : null; }).filter(v => v);
        if (newData.length > 0) {
            localStorage.setItem('takashi_master_data', JSON.stringify(newData));
            localStorage.setItem('takashi_mastered_keys', '[]'); 
            alert("データを更新しました！");
            setupPanel.style.display = 'none'; initApp();
        }
    }

    function loadWeak() {
        const weak = safeGetArray('takashi_weak_phrases', []);
        if (weak.length > 0) { setupPanel.style.display = 'none'; initApp(weak); }
        else alert("苦手フレーズはまだありません");
    }

    function clearAllData() {
        if(confirm("学習記録や登録データをすべて初期化します。よろしいですか？")) {
            localStorage.clear(); alert("データを初期化しました。画面をリロードします。"); location.reload();
        }
    }

    function playTTS() {
        if (!window.speechSynthesis || !currentList[currentIndex]) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentList[currentIndex].eng);
        u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u);
    }

    function initApp(customList = null) {
        try {
            const master = safeGetArray('takashi_master_data', DEFAULT_DATA);
            const validMaster = master.length > 0 ? master : DEFAULT_DATA;
            
            currentList = customList || [...validMaster].sort(() => Math.random() - 0.5).slice(0, 10);
            isReviewMode = !!customList; currentIndex = 0; reviewList = [];
            
            if(learningUI) learningUI.style.display = 'block'; 
            if(roundEndPanel) roundEndPanel.style.display = 'none';
            
            updateStreakUI(); checkTotalMastery(); render();
        } catch (err) {
            document.getElementById('jp-phrase').innerText = "初期化エラー: データをリセットしてください";
        }
    }

    function mergeTexts(base, addition) {
        if (!base) return addition.trim(); if (!addition) return base.trim();
        let a = base.trim(), b = addition.trim();
        let aN = a.toLowerCase().replace(/[.,?!]/g, '').split(/\s+/), bN = b.toLowerCase().replace(/[.,?!]/g, '').split(/\s+/);
        let overlap = 0;
        for (let i = 1; i <= Math.min(aN.length, bN.length); i++) {
            if (aN.slice(-i).join(" ") === bN.slice(0, i).join(" ")) overlap = i;
        }
        return overlap > 0 ? a + " " + b.split(/\s+/).slice(overlap).join(" ") : a + " " + b;
    }

    const startPtt = (e) => {
        e.preventDefault(); if (isHolding || resultPanel.style.display === 'block') return;
        isHolding = true; globalText = ""; currentSessionText = ""; interimDisplay.innerText = "";
        btnRec.style.backgroundColor = "#d9534f"; btnRec.innerText = "🎙️ 録音中...";
        document.getElementById('status').className = "status-badge status-rec";
        try { if(recognition) recognition.start(); } catch(err) {}
    };

    const stopPtt = (e) => {
        if (e) e.preventDefault(); if (!isHolding) return;
        isHolding = false; try { if(recognition) recognition.stop(); } catch(err) {} 
    };

    btnRec.addEventListener('pointerdown', startPtt);
    btnRec.addEventListener('pointerup', stopPtt);
    btnRec.addEventListener('pointercancel', stopPtt);
    btnRec.addEventListener('pointerout', stopPtt);

    if (recognition) {
        recognition.onresult = (event) => {
            let text = ""; for (let i = 0; i < event.results.length; i++) text += event.results[i][0].transcript;
            currentSessionText = text; interimDisplay.innerText = mergeTexts(globalText, currentSessionText);
        };

        recognition.onend = () => {
            if (currentSessionText) { globalText = mergeTexts(globalText, currentSessionText); currentSessionText = ""; }
            if (isHolding) try { recognition.start(); } catch(e) {}
            else {
                let ft = globalText.replace(/\s+/g, ' ').trim();
                if (ft) judge(ft); else render();
            }
        };
    }

    function judge(userSpeech) {
        if (!currentList[currentIndex]) return;
        const model = currentList[currentIndex].eng;
        const norm = (t) => t.toLowerCase().replace(/[.,?!]/g, '').replace(/we're/g, 'we are').replace(/i'm/g, 'i am').replace(/let's/g, 'let us').replace(/\s+/g, ' ').trim();
        const nM = norm(model), nU = norm(userSpeech);
        const mWs = nM.split(' '), uWs = nU.split(' ');
        let matches = 0;
        mWs.forEach(mw => { if (uWs.some(uw => uw === mw || uw + 's' === mw || mw + 's' === uw)) matches++; });
        const rate = matches / (mWs.length || 1);
        const isCorrect = nU !== "" && (nM === nU || rate >= 0.6);

        if (isCorrect) {
            let mKeys = safeGetArray('takashi_mastered_keys', []);
            if (!mKeys.includes(model)) { mKeys.push(model); localStorage.setItem('takashi_mastered_keys', JSON.stringify(mKeys)); }
            
            // 正解した場合は苦手リストから削除
            let weak = safeGetArray('takashi_weak_phrases', []);
            let newWeak = weak.filter(w => w.eng !== model);
            if(weak.length !== newWeak.length) localStorage.setItem('takashi_weak_phrases', JSON.stringify(newWeak));

        } else {
            let weak = safeGetArray('takashi_weak_phrases', []);
            if (!weak.some(w => w.eng === model)) {
                weak.push(currentList[currentIndex]);
                localStorage.setItem('takashi_weak_phrases', JSON.stringify(weak));
            }
            if (!reviewList.includes(currentList[currentIndex])) reviewList.push(currentList[currentIndex]);
        }
        showResult(isCorrect, model, userSpeech);
    }

    function showResult(isCorrect, model, user, isPass = false) {
        resultPanel.style.display = 'block'; resultPanel.className = `result-panel ${isCorrect ? 'correct' : 'incorrect'}`;
        document.getElementById('result-msg').innerText = isPass ? "SKIP" : (isCorrect ? "✅ PERFECT!" : "⚠️ KEEP TRYING!");
        document.getElementById('model-text-content').innerText = model;
        document.getElementById('user-text').innerText = `You said: ${user || "(No speech)"}`;
        
        btnRec.style.display = 'none'; document.getElementById('hint-btn').style.display = 'none';
        document.getElementById('pass-btn').style.display = 'none'; 
        
        // ★ やり直し・正解にするボタンの表示制御
        document.getElementById('retry-btn').style.display = 'inline-block';
        document.getElementById('override-btn').style.display = (!isCorrect && !isPass) ? 'inline-block' : 'none';
        document.getElementById('next-btn').style.display = 'block';
        
        playTTS();
    }

    // ★ やり直すボタンの処理
    document.getElementById('retry-btn').onclick = () => {
        // 復習リストに入ってしまった記録を取り消す
        if(currentList[currentIndex]) {
            reviewList = reviewList.filter(item => item.eng !== currentList[currentIndex].eng);
        }
        render(); // 画面をリセット
    };

    // ★ 手動で正解にするボタンの処理
    document.getElementById('override-btn').onclick = () => {
        const p = currentList[currentIndex];
        if(!p) return;
        const model = p.eng;

        // 復習リストから削除
        reviewList = reviewList.filter(item => item.eng !== model);

        // マスターリスト（達成度）に追加
        let mKeys = safeGetArray('takashi_mastered_keys', []);
        if (!mKeys.includes(model)) { 
            mKeys.push(model); 
            localStorage.setItem('takashi_mastered_keys', JSON.stringify(mKeys)); 
        }

        // 苦手リストから削除
        let weak = safeGetArray('takashi_weak_phrases', []);
        let newWeak = weak.filter(w => w.eng !== model);
        localStorage.setItem('takashi_weak_phrases', JSON.stringify(newWeak));

        // 画面の見た目を「正解」に切り替える
        document.getElementById('result-msg').innerText = "✅ PERFECT! (手動判定)";
        resultPanel.className = 'result-panel correct';
        document.getElementById('override-btn').style.display = 'none';
        
        // 達成度を即座に更新
        checkTotalMastery();
    };

    function render() {
        if (!currentList) return;
        if (currentIndex >= currentList.length) {
            if (learningUI) learningUI.style.display = 'none';
            if (roundEndPanel) roundEndPanel.style.display = 'block';
            
            if (isReviewMode) {
                document.getElementById('round-end-title').innerText = "復習完了！";
                if (reviewList.length > 0) {
                    document.getElementById('round-end-msg').innerText = `まだ ${reviewList.length} 問が不正解でした。`;
                    document.getElementById('start-review-btn').style.display = 'block';
                    document.getElementById('start-review-btn').innerText = "⚠️ もう一度復習する";
                } else {
                    document.getElementById('round-end-msg').innerText = "完璧です！弱点を克服しました！";
                    document.getElementById('start-review-btn').style.display = 'none';
                }
                document.getElementById('next-round-btn').innerText = "🔄 ランダム10問に戻る";
            } else {
                document.getElementById('round-end-title').innerText = "10問完了！";
                if (reviewList.length > 0) {
                    document.getElementById('round-end-msg').innerText = `間違えた問題が ${reviewList.length} 問あります。`;
                    document.getElementById('start-review-btn').style.display = 'block';
                    document.getElementById('start-review-btn').innerText = "⚠️ 間違えた問題を復習";
                } else {
                    document.getElementById('round-end-msg').innerText = "全問正解！パーフェクトです！";
                    document.getElementById('start-review-btn').style.display = 'none';
                }
                document.getElementById('next-round-btn').innerText = "🔄 新しいランダム10問へ";
            }
            return;
        }

        const p = currentList[currentIndex];
        if (!p) return; 
        const phraseEl = document.getElementById('jp-phrase');
        if (phraseEl) phraseEl.innerText = p.jp;
        
        document.getElementById('progress-text').innerText = (isReviewMode ? "【復習】" : "") + `Phrase ${currentIndex + 1} / ${currentList.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / currentList.length) * 100}%`;
        
        resultPanel.style.display = 'none'; document.getElementById('next-btn').style.display = 'none';
        document.getElementById('retry-btn').style.display = 'none'; document.getElementById('override-btn').style.display = 'none';
        
        btnRec.style.display = 'block'; btnRec.innerText = '👆 押して録音'; btnRec.style.backgroundColor = '#00704a';
        document.getElementById('hint-btn').style.display = 'inline-block'; document.getElementById('pass-btn').style.display = 'inline-block';
        interimDisplay.innerText = ''; document.getElementById('status').className = "status-badge status-ready";
        isHolding = false; globalText = ""; currentSessionText = "";
    }

    document.getElementById('settings-btn').onclick = () => {
        if(setupPanel) setupPanel.style.display = setupPanel.style.display === 'block' ? 'none' : 'block';
    };
    document.getElementById('next-btn').onclick = () => { currentIndex++; render(); };
    document.getElementById('hint-btn').onclick = () => { if(currentList[currentIndex]) alert("Hint: " + currentList[currentIndex].eng.substring(0, 12) + "..."); };
    document.getElementById('pass-btn').onclick = () => { 
        if(currentList[currentIndex]) {
            reviewList.push(currentList[currentIndex]); 
            showResult(false, currentList[currentIndex].eng, "(Skipped)", true); 
        }
    };

    document.getElementById('start-review-btn').onclick = () => { initApp(reviewList); };
    document.getElementById('next-round-btn').onclick = () => { initApp(); };

    initApp();
</script>
</body>
</html>
