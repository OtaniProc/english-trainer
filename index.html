<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Output Trainer - Cloud</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 1.5rem; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; }
        .streak-badge { background: #fffae6; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; color: #d48806; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        #jp-phrase { font-size: 1.25rem; font-weight: bold; min-height: 5rem; display: flex; align-items: center; justify-content: center; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; padding: 15px; line-height: 1.5; }
        .button-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { border: none; padding: 16px; border-radius: 30px; cursor: pointer; font-size: 1.05rem; font-weight: bold; flex: 1 1 43%; }
        #start-btn { background-color: #00704a; color: white; }
        #stop-btn { background-color: #d9534f; color: white; display: none; flex: 1 1 90%; }
        #hint-btn { background-color: #f0ad4e; color: white; }
        #giveup-btn { background-color: #777; color: white; }
        #next-btn { background-color: #005a8d; color: white; display: none; flex: 1 1 90%; }
        .coach-panel { background-color: #f0f4ff; border-left: 5px solid #005a8d; padding: 15px; text-align: left; display: none; border-radius: 0 10px 10px 0; margin-top: 20px; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    </style>
</head>
<body>

<div id="loading" class="loading-screen">
    <h2>Morning, Takashi!</h2>
    <p id="loading-msg">AI特訓メニューを生成中...</p>
</div>

<div class="card">
    <div id="streak-display" class="streak-badge">🔥 連続記録 確認中</div>
    <div id="progress-text" style="font-size: 0.8rem; color: #666;">Phrase 1 / 20</div>
    <div id="jp-phrase">Loading...</div>
    <div id="hint-text" style="color: #f0ad4e; font-size: 0.85rem; margin-bottom: 10px; min-height: 1.2em;"></div>
    
    <div class="button-group">
        <button id="start-btn">録音開始</button>
        <button id="stop-btn">判定する</button>
        <button id="hint-btn">ヒント</button>
        <button id="giveup-btn">ギブアップ</button>
        <button id="next-btn">次のフレーズへ ➔</button>
    </div>

    <p id="transcript" style="font-size: 0.85rem; color: #888; font-style: italic; margin-top: 10px; min-height: 1.2em;"></p>

    <div class="coach-panel" id="coach-panel">
        <div style="font-size: 0.85rem; margin-bottom: 10px;">
            <div style="color: #00704a; font-weight: bold;">[Model] <span id="model-answer"></span></div>
            <div style="color: #d9534f; margin-top: 5px;">[Your] <span id="your-voice"></span></div>
        </div>
        <div id="coach-content" style="font-size: 0.9rem; line-height: 1.4; border-top: 1px solid #ddd; padding-top: 10px;"></div>
    </div>
</div>

<script>
    // --- APIキー管理（GitHub Public対応） ---
    const API_KEY = localStorage.getItem('GEMINI_API_KEY') || prompt("Gemini API Keyを入力してください:");
    if (API_KEY) { localStorage.setItem('GEMINI_API_KEY', API_KEY); }

    const MODEL_NAME = "gemini-2.0-flash"; // より安定したモデル名を指定
    let phrases = [];
    let currentIndex = 0;
    let finalTranscript = '';

    function displayStreak() {
        const streak = JSON.parse(localStorage.getItem('eng_streak') || '{"count":0,"last":""}');
        document.getElementById('streak-display').innerText = `🔥 連続 ${streak.count} 日記録中`;
    }

    async function initApp() {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
        const promptText = "Procurement (RFP, cost), Father (kids, cram school), Hobbies (Starbucks, Nintendo)に関する英会話フレーズ20個を JSON [{jp, full}] 形式のみで出力してください。";

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });
            const data = await res.json();
            const rawText = data.candidates[0].content.parts[0].text;
            const jsonMatch = rawText.match(/\[[\s\S]*\]/);
            phrases = JSON.parse(jsonMatch[0]);
            document.getElementById('loading').style.display = 'none';
            render();
        } catch (e) {
            // AI生成失敗時は固定フレーズを出す（保険）
            phrases = [
                {jp: "次の四半期の調達計画を立てましょう。", full: "Let's plan our procurement for the next quarter."},
                {jp: "塾の準備はできた？カバン持った？", full: "Are you ready for cram school? Did you grab your bag?"}
            ];
            document.getElementById('loading').style.display = 'none';
            render();
        }
    }

    function render() {
        const p = phrases[currentIndex];
        document.getElementById('jp-phrase').innerText = p.jp;
        document.getElementById('progress-text').innerText = `Phrase ${currentIndex + 1} / ${phrases.length}`;
        document.getElementById('hint-text').innerText = "";
        document.getElementById('coach-panel').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('start-btn').style.display = "inline-block";
        document.getElementById('hint-btn').style.display = "inline-block";
        document.getElementById('giveup-btn').style.display = "inline-block";
        document.getElementById('stop-btn').style.display = "none";
        document.getElementById('transcript').innerText = "";
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.interimResults = true;

    document.getElementById('start-btn').onclick = () => {
        finalTranscript = '';
        recognition.start();
        document.getElementById('start-btn').style.display = "none";
        document.getElementById('hint-btn').style.display = "none";
        document.getElementById('giveup-btn').style.display = "none";
        document.getElementById('stop-btn').style.display = "inline-block";
    };

    document.getElementById('stop-btn').onclick = () => {
        recognition.stop();
        document.getElementById('stop-btn').style.display = "none";
        document.getElementById('coach-panel').style.display = "block";
        document.getElementById('coach-content').innerText = "Analyzing...";
        // スマホの音声確定を待つウェイト
        setTimeout(() => {
            if (finalTranscript) callGemini(finalTranscript);
            else document.getElementById('coach-content').innerText = "音声が聞き取れませんでした。";
        }, 800);
    };

    document.getElementById('hint-btn').onclick = () => {
        document.getElementById('hint-text').innerText = `Hint: ${phrases[currentIndex].full.substring(0, 15)}...`;
    };

    document.getElementById('giveup-btn').onclick = () => {
        finalTranscript = "(Skipped)";
        displayResult("模範解答を確認しましょう。");
    };

    recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
            else interim += event.results[i][0].transcript;
        }
        document.getElementById('transcript').innerText = finalTranscript + interim;
    };

    async function callGemini(speech) {
        const target = phrases[currentIndex];
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `英語コーチとして回答。和訳:「${target.jp}」、模範:「${target.full}」、発話:「${speech}」。合否と改善点を日本語2行で。` }] }]
                })
            });
            const data = await response.json();
            displayResult(data.candidates[0].content.parts[0].text);
        } catch (e) {
            displayResult("通信エラーですが、録音は成功しています。次へ進みましょう。");
        }
    }

    function displayResult(txt) {
        document.getElementById('model-answer').innerText = phrases[currentIndex].full;
        document.getElementById('your-voice').innerText = finalTranscript;
        document.getElementById('coach-content').innerText = txt;
        document.getElementById('coach-panel').style.display = "block";
        document.getElementById('next-btn').style.display = "inline-block";
    }

    document.getElementById('next-btn').onclick = () => {
        currentIndex++;
        if (currentIndex < phrases.length) render();
        else {
            const today = new Date().toISOString().split('T')[0];
            let streak = JSON.parse(localStorage.getItem('eng_streak') || '{"count":0,"last":""}');
            if (streak.last !== today) { streak.count += 1; streak.last = today; localStorage.setItem('eng_streak', JSON.stringify(streak)); }
            alert("20問終了！ストリーク更新！");
            location.reload();
        }
    };

    displayStreak();
    initApp();
</script>
</body>
</html>
