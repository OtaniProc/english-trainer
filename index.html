<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100 Phrases Master - Perfect Hold</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f0f4f8; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: #00704a; width: 0%; transition: 0.3s; }
        #jp-phrase { font-size: 1.4rem; font-weight: bold; min-height: 4rem; margin: 15px 0; color: #333; line-height: 1.4; }
        #interim-transcript { font-size: 1.1rem; color: #d9534f; min-height: 2em; font-style: italic; margin-bottom: 15px; border-bottom: 2px solid #eee; word-break: break-all; padding: 5px; }
        .streak-badge { background: #fff5f5; color: #e53e3e; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; border: 1px solid #feb2b2; }
        
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .status-ready { background: #e1f5fe; color: #01579b; }
        .status-rec { background: #ffebee; color: #c62828; animation: pulse 1.5s infinite; }
        .status-review { background: #fefcbf; color: #744210; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .button-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-size: 1rem; font-weight: bold; flex: 1 1 45%; transition: 0.2s; }
        
        /* 長押しボタン特有の設定 */
        #rec-btn { 
            background-color: #00704a; color: white; flex: 1 1 90%; 
            touch-action: none; /* スクロールやズームを完全禁止 */
            -webkit-user-select: none; user-select: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #rec-btn:active { transform: scale(0.96); box-shadow: 0 2px 3px rgba(0,0,0,0.2); }
        
        #hint-btn { background-color: #f0ad4e; color: white; }
        #pass-btn { background-color: #eee; color: #555; }
        #next-btn { background-color: #005a8d; color: white; flex: 1 1 90%; display: none; }

        .result-panel { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: left; }
        .correct { background-color: #e8f5e9; border: 2px solid #4caf50; }
        .incorrect { background-color: #fff5f5; border: 2px solid #feb2b2; }
        .model-text { font-size: 1.1rem; font-weight: bold; color: #2e7d32; margin-bottom: 5px; }
        .user-text { font-size: 1rem; color: #d32f2f; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div id="streak-display" class="streak-badge">🔥 0 days streak</div>
    <div id="status" class="status-badge status-ready">READY</div>
    <div id="progress-text" style="font-size: 0.8rem; color: #888;">Phrase 1 / 10</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="jp-phrase">Loading...</div>
    <div id="interim-transcript"></div>
    
    <div class="button-group">
        <button id="rec-btn">👆 押している間ずっと録音</button>
        <button id="hint-btn">💡 ヒント</button>
        <button id="pass-btn">パス</button>
        <button id="next-btn">次のフレーズへ ➔</button>
    </div>

    <div id="result-panel" class="result-panel">
        <div id="result-msg" style="font-weight: bold; margin-bottom: 10px;"></div>
        <div class="model-text" id="model-text"></div>
        <div class="user-text" id="user-text"></div>
    </div>
</div>

<script>
    const MASTER_DATA = [
        {jp: "次の四半期の調達計画を立てましょう。", eng: "Let's plan our procurement for the next quarter"},
        {jp: "塾の準備はできた？カバン持った？", eng: "Are you ready for cram school? Did you grab your bag"},
        {jp: "スタバでモバイルオーダーしたから、すぐ受け取れるよ。", eng: "I placed a mobile order at Starbucks so we can pick it up now"},
        {jp: "コストと品質のバランスを考える必要があります。", eng: "We need to consider the balance between cost and quality"},
        {jp: "ドラムの練習、このリズムが難しいな。", eng: "I'm struggling with this rhythm in today's drum practice"},
        {jp: "相見積もりを取って、比較検討しましょう。", eng: "Let's get competitive quotes and compare them"},
        {jp: "この作業を自動化して手作業をゼロにしましょう。", eng: "Let's automate this task to achieve zero manual work"},
        {jp: "持続可能な調達ソリューションを求めています。", eng: "We're looking for sustainable procurement solutions"},
        {jp: "子供たちの塾の送り迎えでバタバタしています。", eng: "I'm busy picking up and dropping off the kids at cram school"},
        {jp: "それは私の専門外ですが、確認してみます。", eng: "That's outside my expertise but I'll check on it"}
    ];

    let currentList = [], currentIndex = 0, reviewList = [], isReviewMode = false;
    
    // 状態管理とテキスト退避用の金庫
    let isHolding = false;
    let savedText = "";      // 無音停止などで途切れた時の確定済みテキスト
    let currentRunText = ""; // 現在のマイク稼働中に聞き取っているテキスト

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = true; 

    const btnRec = document.getElementById('rec-btn'), btnHint = document.getElementById('hint-btn'),
          btnPass = document.getElementById('pass-btn'), btnNext = document.getElementById('next-btn'),
          statusBadge = document.getElementById('status'), interimDisplay = document.getElementById('interim-transcript'),
          resultPanel = document.getElementById('result-panel');

    function updateStreak() {
        const today = new Date().toDateString();
        let streakData = JSON.parse(localStorage.getItem('takashi_streak') || '{"count":0, "last":""}');
        if (streakData.last !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (streakData.last === yesterday.toDateString()) streakData.count++;
            else streakData.count = 1;
            streakData.last = today; localStorage.setItem('takashi_streak', JSON.stringify(streakData));
        }
        document.getElementById('streak-display').innerText = `🔥 ${streakData.count} days streak`;
    }

    function initApp(customList = null) {
        currentList = customList ? customList : [...MASTER_DATA].sort(() => Math.random() - 0.5);
        isReviewMode = !!customList; currentIndex = 0; if(!customList) reviewList = [];
        updateStreak(); render();
    }

    const startPtt = (e) => {
        e.preventDefault();
        if (isHolding || resultPanel.style.display === 'block') return;
        
        isHolding = true;
        savedText = "";
        currentRunText = "";
        interimDisplay.innerText = "";
        
        btnRec.style.backgroundColor = "#d9534f";
        btnRec.innerText = "🎙️ 録音中... (無言でもOK！離すと判定)";
        statusBadge.innerText = "LISTENING...";
        statusBadge.className = "status-badge status-rec";
        
        try { recognition.start(); } catch(err) {}
    };

    const stopPtt = (e) => {
        if (e) e.preventDefault();
        if (!isHolding) return;
        
        isHolding = false;
        try { recognition.stop(); } catch(err) {} 
        
        btnRec.style.backgroundColor = "#00704a";
        btnRec.innerText = "処理中...";
        statusBadge.innerText = "JUDGING...";
        statusBadge.className = "status-badge status-ready";
    };

    btnRec.addEventListener('pointerdown', startPtt);
    btnRec.addEventListener('pointerup', stopPtt);
    btnRec.addEventListener('pointercancel', stopPtt);
    btnRec.addEventListener('pointerout', stopPtt);

    recognition.onresult = (event) => {
        let text = "";
        // 今回のセッション（マイクがオンになってから）の分だけをまとめる
        for (let i = 0; i < event.results.length; i++) {
            text += event.results[i][0].transcript;
        }
        currentRunText = text; 
        
        // 過去の退避テキスト(savedText) ＋ 今回のセッション(currentRunText) を表示
        interimDisplay.innerText = (savedText + " " + currentRunText).trim();
    };

    // ★ ここが「無音でも自動再起動」の完全なロジックです
    recognition.onend = () => {
        // マイクがオフになった瞬間、今のセッションの言葉を「確定済み金庫」に移す
        savedText = (savedText + " " + currentRunText).trim();
        currentRunText = ""; // セッションがリセットされるので空にする
        
        if (isHolding) {
            // Takashiさんがまだボタンを押しているのに、ブラウザが無言判定で切った場合！
            // 瞬時にマイクを叩き起こして再スタートする
            try { recognition.start(); } catch(e) {}
        } else {
            // Takashiさんが本当に指を離した場合、判定処理へ進む
            let finalText = savedText.replace(/\s+/g, ' ').trim();
            if (finalText.length > 0) {
                judge(finalText);
            } else {
                btnRec.innerText = "👆 押している間ずっと録音";
                statusBadge.innerText = isReviewMode ? 'REVIEW MODE' : 'READY';
                statusBadge.className = 'status-badge ' + (isReviewMode ? 'status-review' : 'status-ready');
            }
        }
    };

    function judge(userSpeech) {
        const modelSpeech = currentList[currentIndex].eng;
        const normalize = (t) => t.toLowerCase().replace(/[.,?!]/g, '').replace(/\s+/g, ' ').trim();
        const nModel = normalize(modelSpeech), nUser = normalize(userSpeech);
        
        const mWords = nModel.split(' '), uWords = nUser.split(' ');
        let matchCount = 0;
        mWords.forEach(w => { if(uWords.includes(w)) matchCount++; });
        const matchRate = matchCount / (mWords.length || 1);
        
        const isCorrect = nUser !== "" && (nModel === nUser || matchRate >= 0.7);
        if (!isCorrect && !isReviewMode && !reviewList.includes(currentList[currentIndex])) reviewList.push(currentList[currentIndex]);
        showResult(isCorrect, modelSpeech, userSpeech);
    }

    function showResult(isCorrect, model, user, isPass = false) {
        resultPanel.style.display = 'block';
        resultPanel.className = `result-panel ${isCorrect ? 'correct' : 'incorrect'}`;
        document.getElementById('result-msg').innerText = isPass ? "SKIP" : (isCorrect ? "✅ PERFECT!" : "⚠️ KEEP TRYING!");
        document.getElementById('model-text').innerText = `Model: ${model}`;
        document.getElementById('user-text').innerText = isPass ? "" : `You said: ${user || "(No speech heard)"}`;
        
        btnRec.style.display = 'none'; btnHint.style.display = 'none';
        btnPass.style.display = 'none'; btnNext.style.display = 'block';
    }

    function render() {
        if (currentIndex >= currentList.length) {
            if (isReviewMode) { alert("復習完了！"); initApp(); }
            else if (reviewList.length > 0 && confirm(`間違えた ${reviewList.length} 問を復習しますか？`)) initApp(reviewList);
            else initApp();
            return;
        }
        const p = currentList[currentIndex];
        document.getElementById('jp-phrase').innerText = p.jp;
        document.getElementById('progress-text').innerText = (isReviewMode ? "【復習】" : "") + `Phrase ${currentIndex + 1} / ${currentList.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / currentList.length) * 100}%`;
        
        resultPanel.style.display = 'none'; btnNext.style.display = 'none';
        btnRec.style.display = 'block'; btnRec.innerText = '👆 押している間ずっと録音'; btnRec.style.backgroundColor = '#00704a';
        btnHint.style.display = 'inline-block'; btnPass.style.display = 'inline-block';
        
        interimDisplay.innerText = '';
        statusBadge.innerText = isReviewMode ? 'REVIEW MODE' : 'READY';
        statusBadge.className = 'status-badge ' + (isReviewMode ? 'status-review' : 'status-ready');
        
        isHolding = false;
        savedText = "";
        currentRunText = "";
    }

    btnNext.onclick = () => { currentIndex++; render(); };
    btnHint.onclick = () => { alert("Hint: " + currentList[currentIndex].eng.substring(0, 15) + "..."); };
    btnPass.onclick = () => {
        if (!isReviewMode && !reviewList.includes(currentList[currentIndex])) reviewList.push(currentList[currentIndex]);
        showResult(false, currentList[currentIndex].eng, "", true);
    };

    initApp();
</script>
</body>
</html>
