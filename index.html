<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 接続経路探索</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .log-entry { margin: 10px 0; padding: 10px; border-radius: 5px; text-align: left; font-size: 0.85rem; font-family: monospace; border: 1px solid #ddd; }
        button { padding: 15px; width: 100%; background: #00704a; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .success { background: #f6ffed; border-color: #b7eb8f; color: #389e0d; }
        .fail { background: #fff1f0; border-color: #ffa39e; color: #cf1322; }
    </style>
</head>
<body>

<div class="card">
    <h3>Gemini 接続経路探索</h3>
    <input type="text" id="keyInput" placeholder="API Keyを貼り付け">
    <button id="runBtn">自動探索スタート</button>
    <div id="log"></div>
</div>

<script>
    const logDiv = document.getElementById('log');
    
    function addLog(msg, type) {
        const div = document.createElement('div');
        div.className = 'log-entry ' + type;
        div.innerText = msg;
        logDiv.prepend(div);
    }

    document.getElementById('runBtn').onclick = async () => {
        const key = document.getElementById('keyInput').value.trim();
        if(!key) return alert("Keyを入れてください");
        logDiv.innerHTML = "";
        
        // 探索するURLリスト（v1とv1betaの両方、モデル名のバリエーション）
        const targets = [
            { name: "v1 / gemini-1.5-flash", url: `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}` },
            { name: "v1beta / gemini-1.5-flash", url: `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}` },
            { name: "v1 / gemini-pro", url: `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}` },
            { name: "v1beta / gemini-pro", url: `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}` }
        ];

        for (const target of targets) {
            addLog(`試行中: ${target.name}...`, '');
            try {
                const res = await fetch(target.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Hi" }] }] })
                });
                const data = await res.json();
                
                if (res.ok && data.candidates) {
                    addLog(`🎯 成功!! 【${target.name}】 が有効です。\n返答: ${data.candidates[0].content.parts[0].text}`, 'success');
                    // 成功したURLを記憶
                    localStorage.setItem('STABLE_URL', target.url.split('?')[0]);
                    return;
                } else {
                    addLog(`❌ 失敗: ${target.name} (${data.error ? data.error.message : 'Unknown'})`, 'fail');
                }
            } catch (e) {
                addLog(`🚫 エラー: ${target.name} (${e.message})`, 'fail');
            }
        }
        addLog("全パターン失敗。APIキーの設定（制限）を確認してください。", 'fail');
    };
</script>
</body>
</html>
