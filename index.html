<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100 Phrases Master - Takashi Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f0f4f8; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: #00704a; width: 0%; transition: 0.3s; }
        #jp-phrase { font-size: 1.4rem; font-weight: bold; min-height: 4rem; margin: 15px 0; color: #333; line-height: 1.4; }
        #interim-transcript { font-size: 0.9rem; color: #d9534f; min-height: 1.2em; font-style: italic; margin-bottom: 15px; border-bottom: 1px solid #eee; }
        .streak-badge { background: #fff5f5; color: #e53e3e; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; border: 1px solid #feb2b2; }
        
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .status-ready { background: #e1f5fe; color: #01579b; }
        .status-rec { background: #ffebee; color: #c62828; animation: pulse 1.5s infinite; }
        .status-review { background: #fefcbf; color: #744210; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .button-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-size: 1rem; font-weight: bold; flex: 1 1 45%; transition: 0.2s; }
        #rec-btn { background-color: #00704a; color: white; flex: 1 1 90%; }
        #hint-btn { background-color: #f0ad4e; color: white; }
        #pass-btn { background-color: #eee; color: #555; }
        #next-btn { background-color: #005a8d; color: white; flex: 1 1 90%; display: none; }

        .result-panel { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: left; }
        .correct { background-color: #e8f5e9; border: 2px solid #4caf50; }
        .incorrect { background-color: #fff5f5; border: 2px solid #feb2b2; }
        .model-text { font-size: 1.1rem; font-weight: bold; color: #2e7d32; margin-bottom: 5px; }
        .user-text { font-size: 1rem; color: #d32f2f; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div id="streak-display" class="streak-badge">🔥 0 days streak</div>
    <div id="status" class="status-badge status-ready">READY</div>
    <div id="progress-text" style="font-size: 0.8rem; color: #888;">Phrase 1 / 10</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="jp-phrase">Loading...</div>
    <div id="interim-transcript"></div>
    
    <div class="button-group">
        <button id="rec-btn">録音開始</button>
        <button id="hint-btn">ヒント</button>
        <button id="pass-btn">パス</button>
        <button id="next-btn">次のフレーズへ ➔</button>
    </div>

    <div id="result-panel" class="result-panel">
        <div id="result-msg" style="font-weight: bold; margin-bottom: 10px;"></div>
        <div class="model-text" id="model-text"></div>
        <div class="user-text" id="user-text"></div>
    </div>
</div>

<script>
    // ★ 100フレーズリスト（週に一度、ここを入れ替えてください）
    const MASTER_DATA = [
        {jp: "次の四半期の調達計画を立てましょう。", eng: "Let's plan our procurement for the next quarter"},
        {jp: "塾の準備はできた？カバン持った？", eng: "Are you ready for cram school? Did you grab your bag"},
        {jp: "スタバでモバイルオーダーしたから、すぐ受け取れるよ。", eng: "I placed a mobile order at Starbucks so we can pick it up now"},
        {jp: "コストと品質のバランスを考える必要があります。", eng: "We need to consider the balance between cost and quality"},
        {jp: "ドラムの練習、このリズムが難しいな。", eng: "I'm struggling with this rhythm in today's drum practice"},
        {jp: "相見積もりを取って、比較検討しましょう。", eng: "Let's get competitive quotes and compare them"},
        {jp: "この作業を自動化して手作業をゼロにしましょう。", eng: "Let's automate this task to achieve zero manual work"},
        {jp: "持続可能な調達ソリューションを求めています。", eng: "We're looking for sustainable procurement solutions"},
        {jp: "子供たちの塾の送り迎えでバタバタしています。", eng: "I'm busy picking up and dropping off the kids at cram school"},
        {jp: "それは私の専門外ですが、確認してみます。", eng: "That's outside my expertise but I'll check on it"}
    ];

    let currentList = [];
    let currentIndex = 0;
    let reviewList = [];
    let isReviewMode = false;
    let lastFinalTranscript = "";

    // 継続記録の管理
    function updateStreak() {
        const today = new Date().toDateString();
        let streakData = JSON.parse(localStorage.getItem('takashi_streak') || '{"count":0, "last":""}');
        
        if (streakData.last !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (streakData.last === yesterday.toDateString()) {
                streakData.count++;
            } else {
                streakData.count = 1;
            }
            streakData.last = today;
            localStorage.setItem('takashi_streak', JSON.stringify(streakData));
        }
        document.getElementById('streak-display').innerText = `🔥 ${streakData.count} days streak`;
    }

    function shuffleArray(array) {
        return [...array].sort(() => Math.random() - 0.5);
    }

    function initApp(customList = null) {
        if (customList) {
            currentList = customList;
            isReviewMode = true;
        } else {
            currentList = shuffleArray(MASTER_DATA);
            isReviewMode = false;
            reviewList = [];
        }
        currentIndex = 0;
        updateStreak();
        render();
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.interimResults = true; 
    recognition.continuous = true; // 無音でも勝手に止まらないように設定

    const recBtn = document.getElementById('rec-btn');
    const hintBtn = document.getElementById('hint-btn');
    const passBtn = document.getElementById('pass-btn');
    const nextBtn = document.getElementById('next-btn');
    const statusBadge = document.getElementById('status');
    const resultPanel = document.getElementById('result-panel');
    const interimDisplay = document.getElementById('interim-transcript');

    let isRecording = false;

    function render() {
        if (currentIndex >= currentList.length) {
            handleRoundEnd();
            return;
        }
        const p = currentList[currentIndex];
        document.getElementById('jp-phrase').innerText = p.jp;
        document.getElementById('progress-text').innerText = (isReviewMode ? "【復習】" : "") + `Phrase ${currentIndex + 1} / ${currentList.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / currentList.length) * 100}%`;
        
        resultPanel.style.display = 'none';
        nextBtn.style.display = 'none';
        recBtn.style.display = 'block';
        hintBtn.style.display = 'inline-block';
        passBtn.style.display = 'inline-block';
        recBtn.innerText = '録音開始';
        recBtn.style.backgroundColor = '#00704a';
        interimDisplay.innerText = '';
        statusBadge.innerText = isReviewMode ? 'REVIEW MODE' : 'READY';
        statusBadge.className = 'status-badge ' + (isReviewMode ? 'status-review' : 'status-ready');
        isRecording = false;
        lastFinalTranscript = "";
    }

    recBtn.onclick = () => {
        if (!isRecording) {
            try { recognition.start(); } catch(e) {}
        } else {
            recognition.stop();
            judge(lastFinalTranscript);
        }
    };

    recognition.onstart = () => {
        isRecording = true;
        recBtn.innerText = '判定する';
        recBtn.style.backgroundColor = '#d9534f';
        statusBadge.innerText = 'LISTENING...';
        statusBadge.className = 'status-badge status-rec';
    };

    recognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                lastFinalTranscript = event.results[i][0].transcript;
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        interimDisplay.innerText = interimTranscript || lastFinalTranscript;
    };

    function judge(userSpeech) {
        const modelSpeech = currentList[currentIndex].eng;
        const normalize = (t) => t.toLowerCase().replace(/[.,?!]/g, '').trim();
        const nModel = normalize(modelSpeech);
        const nUser = normalize(userSpeech);
        
        const mWords = nModel.split(' ');
        const uWords = nUser.split(' ');
        let matchCount = 0;
        mWords.forEach(w => { if(uWords.includes(w)) matchCount++; });
        const matchRate = matchCount / mWords.length;
        
        const isCorrect = nUser !== "" && (nModel === nUser || matchRate >= 0.7);

        if (!isCorrect && !isReviewMode) {
            // 復習リストに追加（重複なし）
            if (!reviewList.includes(currentList[currentIndex])) {
                reviewList.push(currentList[currentIndex]);
            }
        }

        showResult(isCorrect, modelSpeech, userSpeech);
    }

    function showResult(isCorrect, model, user, isPass = false) {
        resultPanel.style.display = 'block';
        resultPanel.className = `result-panel ${isCorrect ? 'correct' : 'incorrect'}`;
        document.getElementById('result-msg').innerText = isPass ? "SKIP (Check the answer)" : (isCorrect ? "✅ PERFECT!" : "⚠️ KEEP TRYING!");
        document.getElementById('result-msg').style.color = isCorrect ? "#2e7d32" : "#e53e3e";
        document.getElementById('model-text').innerText = `Model: ${model}`;
        document.getElementById('user-text').innerText = isPass ? "" : `You said: ${user || "(No speech heard)"}`;
        
        recBtn.style.display = 'none';
        hintBtn.style.display = 'none';
        passBtn.style.display = 'none';
        nextBtn.style.display = 'block';
    }

    nextBtn.onclick = () => {
        currentIndex++;
        render();
    };

    hintBtn.onclick = () => {
        alert("Hint: " + currentList[currentIndex].eng.substring(0, 15) + "...");
    };

    passBtn.onclick = () => {
        const target = currentList[currentIndex];
        if (!isReviewMode && !reviewList.includes(target)) {
            reviewList.push(target); // パスした問題も復習へ
        }
        showResult(false, target.eng, "", true);
    };

    function handleRoundEnd() {
        if (isReviewMode) {
            alert("復習完了！お疲れ様でした。");
            initApp();
        } else if (reviewList.length > 0) {
            if (confirm(`1巡しました！間違えた ${reviewList.length} 問を復習しますか？`)) {
                initApp(shuffleArray(reviewList));
            } else {
                initApp();
            }
        } else {
            alert("全問正解！パーフェクトです！");
            initApp();
        }
    }

    initApp();
</script>
</body>
</html>
