<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #status { margin: 20px; padding: 15px; border-radius: 8px; background: #eee; min-height: 50px; white-space: pre-wrap; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #00704a; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Gemini API 接続診断</h2>
    <p>APIキーを入力して、下のボタンを押してください。</p>
    
    <input type="text" id="apiKeyInput" placeholder="API Keyを貼り付け" style="width: 80%; padding: 10px; margin-bottom: 10px;">
    <br>
    <button id="testBtn">通信テスト開始</button>

    <div id="status">ここに結果が表示されます</div>

    <script>
        document.getElementById('testBtn').onclick = async () => {
            const key = document.getElementById('apiKeyInput').value;
            const statusDiv = document.getElementById('status');
            
            if (!key) {
                alert("APIキーを入力してください");
                return;
            }

            statusDiv.innerText = "通信中...";
            statusDiv.style.background = "#fffbe6";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Say 'Connection Successful!'" }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    statusDiv.innerText = "❌ エラー応答:\n" + JSON.stringify(data.error, null, 2);
                    statusDiv.style.background = "#fff1f0";
                } else {
                    const reply = data.candidates[0].content.parts[0].text;
                    statusDiv.innerText = "✅ 通信成功！\nAIからの返信: " + reply;
                    statusDiv.style.background = "#f6ffed";
                }
            } catch (e) {
                statusDiv.innerText = "🚫 通信自体に失敗しました（ブラウザやネットワークのブロック）:\n" + e.message;
                statusDiv.style.background = "#fff1f0";
            }
        };
    </script>
</body>
</html>
